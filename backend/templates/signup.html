{% extends "base.html" %}

{% block title %}
Créer un compte
{% endblock %}

{% block content %}

<section class="section">

    <div class="booking-modal" style="margin: 0 auto;">

        <h2>
            Créer un compte
        </h2>

        <p class="modal-intro">
            Créez votre espace patient rapidement.
        </p>

        {% if error %}
            <p style="color:red;">
                {{ error }}
            </p>
        {% endif %}

        <form method="POST" class="booking-form">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Nom d’utilisateur"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Courriel"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Mot de passe"
                required
            >

            <input
                type="text"
                name="first_name"
                placeholder="Prénom"
                required
            >

            <input
                type="text"
                name="last_name"
                placeholder="Nom"
                required
            >

            <input
                type="text"
                name="phone_number"
                placeholder="Téléphone"
                required
            >

            <textarea
                name="address"
                placeholder="Adresse"
                required
            ></textarea>

            <button type="submit" class="submit-button">
                Créer mon compte
            </button>

        </form>

    </div>

</section>

{% endblock %}
